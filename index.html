<style>
  /* ── HS효성 폰트 ──────────────────────────────────────────────
     ▶ 폰트 파일을 이 HTML과 같은 위치의 /fonts 폴더에 넣어주세요.
       (예: ./fonts/HSHyosung.woff2, ./fonts/HSHyosung.ttf)
       파일이 없으면 자동으로 Pretendard 로 대체되어 그대로 잘 보입니다.
     ─────────────────────────────────────────────────────────── */
  @font-face {
    font-family: "HS Hyosung";
    src: url("./fonts/HSHyosung.woff2") format("woff2"),
         url("./fonts/HSHyosung.ttf")  format("truetype");
    font-weight: 300 700;
    font-display: swap;
  }

  :root {
    --bg:        #08090C;
    --bg-2:      #0C0E13;
    --panel:     rgba(255,255,255,0.028);
    --panel-hi:  rgba(255,255,255,0.055);
    --line:      rgba(255,255,255,0.08);
    --line-hi:   rgba(255,255,255,0.16);
    --platinum:  #EAEDF2;
    --silver:    #C3C9D4;
    --muted:     #7A828F;
    --muted-2:   #565D69;
    --eq:        #A9C6E6;   /* EQ blue-white glow */
    --eq-soft:   rgba(169,198,230,0.14);
    --radius:    16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: "HS Hyosung", "Pretendard Variable", Pretendard, "Inter", -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--silver);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    position: relative;
    transition: background-color .45s ease, color .45s ease;
  }

  /* ── LIGHT THEME ─────────────────────────────────────────── */
  body.light {
    --bg:        #EEF0F3;
    --bg-2:      #FFFFFF;
    --panel:     rgba(18,24,34,0.024);
    --panel-hi:  rgba(18,24,34,0.05);
    --line:      rgba(18,24,34,0.10);
    --line-hi:   rgba(18,24,34,0.20);
    --platinum:  #14171C;
    --silver:    #3B414B;
    --muted:     #757C88;
    --muted-2:   #9BA2AD;
    --eq:        #3E72AE;
    --eq-soft:   rgba(62,114,174,0.12);
  }
  body.light .bg-fx {
    background:
      radial-gradient(120% 80% at 78% -10%, rgba(62,114,174,0.10), transparent 55%),
      radial-gradient(90% 70% at 10% 110%, rgba(120,140,170,0.10), transparent 55%),
      linear-gradient(180deg, #F4F6F9 0%, #EEF0F4 50%, #E7EAEF 100%);
  }
  body.light .bg-grid {
    background-image:
      linear-gradient(to right, rgba(18,24,34,0.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(18,24,34,0.03) 1px, transparent 1px);
  }
  body.light .star-mark-bg { opacity: .04; }
  body.light .star-mark-bg .ring { stroke: #10131a; }
  body.light .card:hover {
    box-shadow: 0 12px 30px -16px rgba(20,35,60,.32), 0 0 0 1px rgba(62,114,174,0.06) inset;
  }

  /* ── ambient background: graphite + EQ glow + faint star watermark ── */
  .bg-fx {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(120% 80% at 78% -10%, rgba(169,198,230,0.10), transparent 55%),
      radial-gradient(90% 70% at 10% 110%, rgba(120,140,170,0.07), transparent 55%),
      linear-gradient(180deg, #0A0C10 0%, #08090C 40%, #06070A 100%);
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .5;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(120% 90% at 50% 0%, #000 30%, transparent 80%);
  }
  .star-mark-bg {
    position: fixed; right: -14vw; top: 50%; transform: translateY(-50%);
    width: 62vw; height: 62vw; max-width: 900px; max-height: 900px;
    z-index: 0; pointer-events: none; opacity: .05;
  }
  .star-mark-bg .ring { stroke: #fff; }

  /* ── layout shell ── */
  .wrap {
    position: relative; z-index: 2;
    max-width: 1180px; margin: 0 auto;
    padding: 46px 32px 80px;
  }

  /* ── header ── */
  header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
    padding-bottom: 30px; margin-bottom: 30px;
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand .mark { width: 46px; height: 46px; flex: none; }
  .brand .mark .ring { stroke: var(--platinum); }
  .brand .txt .eyebrow {
    font-family: "Inter", sans-serif;
    font-size: 11px; letter-spacing: .34em; font-weight: 500;
    color: var(--muted); text-transform: uppercase; margin-bottom: 5px;
  }
  .brand .txt h1 {
    font-family: "Inter", sans-serif;
    font-size: 34px; font-weight: 600; letter-spacing: .04em;
    color: var(--platinum); line-height: 1; display: flex; align-items: baseline; gap: .12em;
  }
  .brand .txt h1 b { color: var(--eq); font-weight: 300; }
  .brand .txt .sub {
    font-size: 13px; color: var(--muted); margin-top: 8px;
    letter-spacing: .01em; font-weight: 400;
  }

  .meta { text-align: right; }
  .meta .greet {
    font-size: 15px; color: var(--silver); font-weight: 500; margin-bottom: 4px;
  }
  .meta .clock {
    font-family: "Inter", sans-serif;
    font-size: 46px; font-weight: 200; letter-spacing: .01em;
    color: var(--platinum); font-variant-numeric: tabular-nums; line-height: 1;
  }
  .meta .date {
    font-size: 12.5px; color: var(--muted); margin-top: 6px; letter-spacing: .01em;
  }

  /* ── theme toggle ── */
  .theme-toggle {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 13px; border-radius: 999px; margin-bottom: 16px;
    background: var(--panel); border: 1px solid var(--line);
    color: var(--muted); cursor: pointer;
    font-family: inherit; font-size: 12px; letter-spacing: .01em;
    transition: border-color .25s, color .25s, background .25s;
  }
  .theme-toggle:hover { border-color: var(--line-hi); color: var(--silver); }
  .theme-toggle:focus-visible { outline: none; border-color: var(--eq); box-shadow: 0 0 0 3px var(--eq-soft); }
  .theme-toggle .opt { display: none; align-items: center; gap: 7px; }
  body:not(.light) .theme-toggle .to-light { display: inline-flex; }
  body.light .theme-toggle .to-dark { display: inline-flex; }

  /* ── rotating quote ── */
  .quote-row { margin-bottom: 40px; }
  .quote {
    display: flex; align-items: center; gap: 13px; max-width: 760px;
    opacity: 1; transition: opacity .6s ease;
  }
  .quote.fading { opacity: 0; }
  .quote .qbar { width: 2px; height: 15px; border-radius: 2px; flex: none; background: var(--eq); opacity: .55; }
  .quote .q-text { font-size: 15px; color: var(--muted); font-weight: 400; letter-spacing: -.01em; line-height: 1.5; }
  .quote .q-author { font-size: 12.5px; color: var(--muted-2); flex: none; }

  /* ── favorites row ── */
  .fav-row { margin-bottom: 38px; }
  .fav-row.hidden { display: none; }
  .fav-head {
    display: flex; align-items: center; gap: 9px; margin-bottom: 14px;
  }
  .fav-head svg { color: var(--eq); opacity: .85; }
  .fav-head h2 {
    font-size: 13.5px; font-weight: 600; color: var(--silver); letter-spacing: .01em;
  }
  .fav-head .tip { font-size: 11.5px; color: var(--muted-2); margin-left: 4px; }
  .fav-cards {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px;
  }

  /* ── star button on cards ── */
  .card .star {
    flex: none; position: relative; z-index: 2;
    width: 30px; height: 30px; border-radius: 8px;
    display: grid; place-items: center;
    background: transparent; border: none; cursor: pointer;
    color: var(--muted-2); opacity: 0;
    transition: opacity .2s, color .2s, transform .2s;
  }
  .card:hover .star, .card .star:focus-visible { opacity: 1; }
  .card .star:hover { color: var(--eq); transform: scale(1.12); }
  .card .star:focus-visible { outline: none; color: var(--eq); }
  .card .star.on { opacity: 1; color: var(--eq); }
  .card .star.on svg { fill: currentColor; }
  @media (hover: none) { .card .star { opacity: .6; } }  /* 모바일: 항상 보이게 */

  /* ── sticky compact favorites bar (appears on scroll) ── */
  .fav-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; gap: 6px;
    padding: 9px 20px;
    background: color-mix(in srgb, var(--bg) 78%, transparent);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
    transform: translateY(-100%); opacity: 0;
    transition: transform .32s cubic-bezier(.2,.7,.2,1), opacity .32s;
    pointer-events: none;
  }
  .fav-bar.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .fav-bar .bar-star { color: var(--eq); flex: none; display: grid; place-items: center; margin-right: 4px; }
  .fav-bar .bar-inner {
    display: flex; align-items: center; gap: 6px;
    overflow-x: auto; scrollbar-width: none; max-width: 100%;
  }
  .fav-bar .bar-inner::-webkit-scrollbar { display: none; }
  .fav-bar a {
    display: inline-flex; align-items: center; gap: 8px; flex: none;
    padding: 7px 13px; border-radius: 999px;
    background: var(--panel); border: 1px solid var(--line);
    color: var(--silver); text-decoration: none;
    font-size: 12.5px; font-weight: 500; letter-spacing: -.01em;
    transition: border-color .2s, color .2s, background .2s, transform .2s;
  }
  .fav-bar a svg { width: 15px; height: 15px; }
  .fav-bar a:hover {
    color: var(--platinum); border-color: rgba(169,198,230,0.35);
    background: var(--eq-soft); transform: translateY(-1px);
  }
  body.light .fav-bar { background: color-mix(in srgb, #F2F4F7 82%, transparent); }
  @media (max-width: 640px) {
    .fav-bar a .bar-name { display: none; }   /* 좁은 화면: 아이콘만 */
    .fav-bar a { padding: 8px 10px; }
  }

  /* ── search ── */
  .search-row { margin-bottom: 44px; }
  .search {
    position: relative; max-width: 460px;
  }
  .search svg { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--muted-2); }
  .search input {
    width: 100%;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; color: var(--platinum);
    font-family: inherit; font-size: 14.5px;
    padding: 14px 54px 14px 48px;
    transition: border-color .25s, background .25s, box-shadow .25s;
  }
  .search input::placeholder { color: var(--muted-2); }
  .search input:focus {
    outline: none; border-color: var(--line-hi);
    background: var(--panel-hi);
    box-shadow: 0 0 0 4px var(--eq-soft);
  }
  .search .kbd {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-family: "Inter", sans-serif; font-size: 11px; color: var(--muted-2);
    border: 1px solid var(--line); border-radius: 6px; padding: 3px 7px;
    background: rgba(255,255,255,0.02);
  }

  /* ── columns ── */
  .cols {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;
  }
  .col { min-width: 0; }
  .col-head {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 18px; padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .col-head .bar {
    width: 3px; height: 15px; border-radius: 2px;
    background: linear-gradient(var(--eq), rgba(169,198,230,0.2));
    flex: none; align-self: center;
  }
  .col-head h2 {
    font-size: 15px; font-weight: 600; color: var(--platinum); letter-spacing: -.01em;
  }
  .col-head .en {
    font-family: "Inter", sans-serif; font-size: 10px; letter-spacing: .28em;
    color: var(--muted-2); text-transform: uppercase; margin-left: auto;
  }
  .col-head .count {
    font-family: "Inter", sans-serif; font-size: 11px; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* ── cards ── */
  .cards { display: flex; flex-direction: column; gap: 10px; }
  .card {
    display: flex; align-items: center; gap: 14px;
    padding: 15px 16px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--silver); text-decoration: none;
    position: relative; overflow: hidden;
    transition: transform .28s cubic-bezier(.2,.7,.2,1), border-color .28s, background .28s, box-shadow .28s;
    animation: rise .5s cubic-bezier(.2,.7,.2,1) backwards;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } }
  .card::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(120% 140% at 100% 0%, var(--eq-soft), transparent 60%);
    opacity: 0; transition: opacity .3s;
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: var(--line-hi);
    background: var(--panel-hi);
    box-shadow: 0 10px 30px -14px rgba(0,0,0,.7), 0 0 0 1px rgba(169,198,230,0.06) inset;
  }
  .card:hover::after { opacity: 1; }
  .card:focus-visible {
    outline: none; border-color: var(--eq);
    box-shadow: 0 0 0 3px var(--eq-soft);
  }
  .card .ico {
    width: 40px; height: 40px; flex: none; border-radius: 11px;
    display: grid; place-items: center;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    color: var(--silver);
    transition: color .28s, border-color .28s, background .28s;
    position: relative; z-index: 1;
  }
  .card:hover .ico { color: var(--eq); border-color: rgba(169,198,230,0.28); background: rgba(169,198,230,0.06); }
  .card .body { min-width: 0; position: relative; z-index: 1; flex: 1; }
  .card .name {
    font-size: 14.5px; font-weight: 500; color: var(--platinum);
    letter-spacing: -.01em; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card .hint {
    font-size: 11px; color: var(--muted-2); margin-top: 2px;
  }
  .card .arrow {
    color: var(--muted-2); flex: none; position: relative; z-index: 1;
    transition: transform .28s, color .28s; opacity: 0;
  }
  .card:hover .arrow { color: var(--silver); transform: translateX(2px); opacity: 1; }
  .card.unset { opacity: .62; }
  .card.unset .name { color: var(--silver); }

  /* ── empty state ── */
  .empty {
    grid-column: 1 / -1; text-align: center; padding: 70px 20px;
    color: var(--muted); font-size: 14px;
  }
  .empty.hidden { display: none; }

  /* ── footer ── */
  footer {
    margin-top: 56px; padding-top: 22px; border-top: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    flex-wrap: wrap;
    font-family: "Inter", sans-serif; font-size: 11.5px;
    letter-spacing: .04em; color: var(--muted-2);
  }
  footer .certified { display: flex; align-items: center; gap: 9px; }
  footer .certified svg { color: var(--muted); }
  footer .certified b { color: var(--muted); font-weight: 500; letter-spacing: .14em; }

  /* ── responsive ── */
  @media (max-width: 860px) {
    .cols { grid-template-columns: 1fr; gap: 34px; }
    .wrap { padding: 34px 20px 64px; }
    header { flex-direction: column; }
    .meta { text-align: left; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; scroll-behavior: auto; }
  }
</style>
</head>
<body>
  <div class="bg-fx"></div>
  <div class="bg-grid"></div>

  <!-- sticky compact favorites bar -->
  <nav class="fav-bar" id="favBar" aria-label="자주 쓰는 툴 바로가기">
    <span class="bar-star">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.6l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.4l-5.8 3.1 1.1-6.5L2.6 9.4l6.5-.9L12 2.6z"/></svg>
    </span>
    <div class="bar-inner" id="favBarInner"></div>
  </nav>

  <!-- ambient star watermark (custom geometric mark) -->
  <svg class="star-mark-bg" viewBox="0 0 200 200" fill="none" aria-hidden="true">
    <circle class="ring" cx="100" cy="100" r="92" stroke-width="1" opacity=".6"/>
    <circle class="ring" cx="100" cy="100" r="66" stroke-width="1" opacity=".9"/>
    <g class="ring" stroke-width="1.2" stroke-linecap="round">
      <line x1="100" y1="100" x2="100" y2="34"/>
      <line x1="100" y1="100" x2="157" y2="133"/>
      <line x1="100" y1="100" x2="43"  y2="133"/>
    </g>
    <circle class="ring" cx="100" cy="100" r="4" fill="#fff" stroke="none"/>
  </svg>

  <div class="wrap">
    <header>
      <div class="brand">
        <svg class="mark" viewBox="0 0 200 200" fill="none" aria-hidden="true">
          <circle class="ring" cx="100" cy="100" r="92" stroke-width="6"/>
          <g class="ring" stroke-width="6" stroke-linecap="round">
            <line x1="100" y1="100" x2="100" y2="20"/>
            <line x1="100" y1="100" x2="169" y2="140"/>
            <line x1="100" y1="100" x2="31"  y2="140"/>
          </g>
        </svg>
        <div class="txt">
          <div class="eyebrow">HS Hyosung The Class</div>
          <h1>UC <b>ONE</b></h1>
          <div class="sub">중고차사업부 통합 업무 포털</div>
        </div>
      </div>

      <div class="meta">
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="테마 전환">
          <span class="opt to-light">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6 17 7M7 17l-1.4 1.4"/></svg>
            라이트 모드
          </span>
          <span class="opt to-dark">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.3 6.3 0 0 0 10.5 10.5Z"/></svg>
            다크 모드
          </span>
        </button>
        <div class="greet" id="greet">안녕하세요</div>
        <div class="clock" id="clock">--:--</div>
        <div class="date" id="date"></div>
      </div>
    </header>

    <div class="quote-row">
      <div class="quote" id="quote">
        <span class="qbar"></span>
        <span class="q-text"></span>
        <span class="q-author"></span>
      </div>
    </div>

    <div class="search-row">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="text" placeholder="툴 검색 — 이름·별칭 무엇이든" autocomplete="off" spellcheck="false" />
        <span class="kbd">/</span>
      </div>
    </div>

    <div class="fav-row hidden" id="favRow">
      <div class="fav-head">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2.6l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.4l-5.8 3.1 1.1-6.5L2.6 9.4l6.5-.9L12 2.6z"/></svg>
        <h2>자주 쓰는 툴</h2>
        <span class="tip">카드의 ★ 를 눌러 추가/해제</span>
      </div>
      <div class="fav-cards" id="favCards"></div>
    </div>

    <div class="cols" id="cols"></div>
    <div class="empty hidden" id="empty">일치하는 툴이 없습니다.</div>

    <footer>
      <span>HSTC · 죽전 · 하남 · 천안</span>
      <span class="certified">
        <svg width="15" height="15" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="10"><circle cx="100" cy="100" r="88"/><g stroke-linecap="round"><line x1="100" y1="100" x2="100" y2="26"/><line x1="100" y1="100" x2="164" y2="137"/><line x1="100" y1="100" x2="36" y2="137"/></g></svg>
        <b>MERCEDES-BENZ CERTIFIED</b>
      </span>
    </footer>
  </div>

<!-- ═══════════════════════════════════════════════════════════════════
     ICONS — 사용 가능한 아이콘 키:
     search · trophy · clipboard · transfer · ledger · inbound ·
     database · grid · spark · calendar · traffic · link (기본값)
     ═══════════════════════════════════════════════════════════════════ -->
<script>
  const ICONS = {
    gabot: '<rect x="4" y="8" width="16" height="11" rx="3"/><path d="M12 8V5"/><circle cx="12" cy="3.4" r="1"/><path d="M8.5 13v1.4"/><path d="M15.5 13v1.4"/><path d="M2.5 11.5v3"/><path d="M21.5 11.5v3"/>',
    search:    '<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>',
    trophy:    '<path d="M6 4h12v4a6 6 0 0 1-12 0V4Z"/><path d="M6 6H3v1a3 3 0 0 0 3 3"/><path d="M18 6h3v1a3 3 0 0 1-3 3"/><path d="M9 17h6"/><path d="M12 14v3"/><path d="M8 21h8"/>',
    clipboard: '<rect x="7" y="4" width="10" height="17" rx="2"/><path d="M9 4V3h6v1"/><path d="M9.5 10h5"/><path d="M9.5 14h5"/>',
    transfer:  '<path d="M4 8h13"/><path d="m13 4 4 4-4 4"/><path d="M20 16H7"/><path d="m11 20-4-4 4-4"/>',
    ledger:    '<path d="M5 4h11a2 2 0 0 1 2 2v14H7a2 2 0 0 1-2-2Z"/><path d="M18 20a2 2 0 0 0 2-2V6"/><path d="M9 8h5"/><path d="M9 12h5"/>',
    inbound:   '<path d="M4 13v5a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"/><path d="M4 13h4l1.5 2.5h5L16 13h4"/><path d="M12 3v7"/><path d="m8.5 7 3.5 3.5L15.5 7"/>',
    database:  '<ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/>',
    grid:      '<rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/>',
    spark:     '<path d="M13 3 4 14h7l-1 7 9-11h-7l1-7Z"/>',
    calendar:  '<rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 10h16"/><path d="M8 3v4"/><path d="M16 3v4"/><path d="M9 15h2"/><path d="M14 15h1"/>',
    traffic:   '<rect x="7" y="3" width="10" height="18" rx="4"/><circle cx="12" cy="8" r="1.6"/><circle cx="12" cy="13" r="1.6"/><circle cx="12" cy="18" r="1.6"/>',
    link:      '<path d="M9 15 15 9"/><path d="M11 6.5 13 4.5a4 4 0 0 1 6 6l-2 2"/><path d="M13 17.5 11 19.5a4 4 0 0 1-6-6l2-2"/>',
  };

  const svgIcon = (key) =>
    `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${ICONS[key] || ICONS.link}</svg>`;

  const arrow =
    '<svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M8 7h9v9"/></svg>';

  // ── favorites state (per-browser) ──
  let favs = [];
  try { favs = JSON.parse(localStorage.getItem("uc-one-favs") || "[]"); } catch (e) {}
  const saveFavs = () => { try { localStorage.setItem("uc-one-favs", JSON.stringify(favs)); } catch (e) {} };

  const starSvg =
    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 2.6l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.4l-5.8 3.1 1.1-6.5L2.6 9.4l6.5-.9L12 2.6z"/></svg>';

  const cardHtml = (l, extraDelay) => {
    const unset = !l.url || l.url === "#";
    const isFav = favs.includes(l.name);
    const searchKey = [l.name, ...(l.alias || [])].join(" ").toLowerCase();
    return `<a class="card${unset ? " unset" : ""}" href="${l.url || "#"}"
               ${unset ? 'onclick="return false"' : 'target="_blank" rel="noopener"'}
               data-name="${l.name}" data-search="${searchKey}"
               style="animation-delay:${extraDelay.toFixed(2)}s">
              <span class="ico">${svgIcon(l.icon)}</span>
              <span class="body">
                <span class="name">${l.name}</span>
                ${unset ? '<span class="hint">링크 설정 필요</span>' : ""}
              </span>
              <button class="star${isFav ? " on" : ""}" type="button"
                      aria-label="${isFav ? "즐겨찾기 해제" : "즐겨찾기 추가"}"
                      data-fav="${l.name}">${starSvg}</button>
              ${arrow}
            </a>`;
  };

  // ── render everything (favorites + columns) ──
  const colsEl = document.getElementById("cols");
  const favRow = document.getElementById("favRow");
  const favCards = document.getElementById("favCards");

  function renderAll() {
    // favorites row
    const favLinks = favs.map((n) => LINKS.find((l) => l.name === n)).filter(Boolean);
    favRow.classList.toggle("hidden", favLinks.length === 0);
    let d = 0;
    favCards.innerHTML = favLinks.map((l) => { d += 0.04; return cardHtml(l, d); }).join("");

    // category columns
    colsEl.innerHTML = "";
    let delay = 0;
    CATEGORIES.forEach((cat) => {
      const items = LINKS.filter((l) => l.cat === cat.key);
      const col = document.createElement("section");
      col.className = "col";
      col.dataset.cat = cat.key;
      const cards = items.map((l) => { delay += 0.045; return cardHtml(l, delay); }).join("");
      col.innerHTML = `
        <div class="col-head">
          <span class="bar"></span>
          <h2>${cat.label}</h2>
          <span class="count">${items.length}</span>
          <span class="en">${cat.en}</span>
        </div>
        <div class="cards">${cards}</div>`;
      colsEl.appendChild(col);
    });

    applyFilter(); // 검색어가 있으면 유지
    renderFavBar();
    updateFavBar();
  }

  // star clicks (delegated, works for both sections)
  document.addEventListener("click", (e) => {
    const btn = e.target.closest(".star");
    if (!btn) return;
    e.preventDefault(); e.stopPropagation();
    const name = btn.dataset.fav;
    favs = favs.includes(name) ? favs.filter((n) => n !== name) : [...favs, name];
    saveFavs();
    renderAll();
  });

  // ── sticky compact favorites bar ──
  const favBar = document.getElementById("favBar");
  const favBarInner = document.getElementById("favBarInner");

  function renderFavBar() {
    const favLinks = favs.map((n) => LINKS.find((l) => l.name === n)).filter(Boolean);
    favBarInner.innerHTML = favLinks.map((l) => {
      const unset = !l.url || l.url === "#";
      return `<a href="${l.url || "#"}" ${unset ? 'onclick="return false"' : 'target="_blank" rel="noopener"'} title="${l.name}">
                ${svgIcon(l.icon)}<span class="bar-name">${l.name}</span>
              </a>`;
    }).join("");
  }

  function updateFavBar() {
    if (favs.length === 0) { favBar.classList.remove("show"); return; }
    // 즐겨찾기 줄(또는 그 자리)이 화면 위로 지나가면 바 표시
    const anchor = favRow.classList.contains("hidden") ? document.querySelector(".search-row") : favRow;
    const passed = anchor && anchor.getBoundingClientRect().bottom < 0;
    favBar.classList.toggle("show", !!passed);
  }
  window.addEventListener("scroll", updateFavBar, { passive: true });

  // ── live search filter (name + alias) ──
  const q = document.getElementById("q");
  const emptyEl = document.getElementById("empty");
  function applyFilter() {
    const term = q.value.trim().toLowerCase();
    let anyVisible = false;
    // 검색 중엔 즐겨찾기 줄은 숨김 (결과가 중복돼 보이니까)
    favRow.classList.toggle("hidden", term !== "" || favs.length === 0);
    document.querySelectorAll("#cols .col").forEach((col) => {
      let colVisible = false;
      col.querySelectorAll(".card").forEach((card) => {
        const match = card.dataset.search.includes(term);
        card.style.display = match ? "" : "none";
        if (match) { colVisible = true; anyVisible = true; }
      });
      col.style.display = colVisible ? "" : "none";
    });
    emptyEl.classList.toggle("hidden", anyVisible);
  }
  q.addEventListener("input", applyFilter);

  renderAll();

  // "/" focuses search, Esc clears
  document.addEventListener("keydown", (e) => {
    if (e.key === "/" && document.activeElement !== q) { e.preventDefault(); q.focus(); }
    if (e.key === "Escape" && document.activeElement === q) { q.value = ""; q.dispatchEvent(new Event("input")); q.blur(); }
  });

  // ── clock + greeting ──
  const clockEl = document.getElementById("clock");
  const dateEl = document.getElementById("date");
  const greetEl = document.getElementById("greet");
  const days = ["일", "월", "화", "수", "목", "금", "토"];
  function tick() {
    const n = new Date();
    const hh = String(n.getHours()).padStart(2, "0");
    const mm = String(n.getMinutes()).padStart(2, "0");
    clockEl.textContent = `${hh}:${mm}`;
    dateEl.textContent = `${n.getFullYear()}. ${String(n.getMonth()+1).padStart(2,"0")}. ${String(n.getDate()).padStart(2,"0")} (${days[n.getDay()]})`;
    const h = n.getHours();
    const g = h < 6 ? "새벽입니다" : h < 12 ? "좋은 아침입니다" : h < 18 ? "좋은 오후입니다" : "좋은 저녁입니다";
    greetEl.textContent = g;
  }
  tick(); setInterval(tick, 1000 * 10);

  // ── theme toggle (preference remembered) ──
  const themeToggle = document.getElementById("themeToggle");
  const applyTheme = (t) => document.body.classList.toggle("light", t === "light");
  let savedTheme = "dark";
  try { savedTheme = localStorage.getItem("uc-one-theme") || "dark"; } catch (e) {}
  applyTheme(savedTheme);
  themeToggle.addEventListener("click", () => {
    const next = document.body.classList.contains("light") ? "dark" : "light";
    applyTheme(next);
    try { localStorage.setItem("uc-one-theme", next); } catch (e) {}
  });

  // ── rotating quote (gentle fade, no immediate repeat) ──
  const quoteEl = document.getElementById("quote");
  const qTextEl = quoteEl.querySelector(".q-text");
  const qAuthEl = quoteEl.querySelector(".q-author");
  const shuffle = (a) => { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
  let order = shuffle([...Array(QUOTES.length).keys()]);
  let qi = 0;
  const showQuote = (idx) => {
    qTextEl.textContent = QUOTES[idx].t;
    qAuthEl.textContent = QUOTES[idx].a ? "— " + QUOTES[idx].a : "";
  };
  showQuote(order[0]);
  if (QUOTES.length > 1) {
    setInterval(() => {
      quoteEl.classList.add("fading");
      setTimeout(() => {
        qi = (qi + 1) % order.length;
        if (qi === 0) order = shuffle(order);
        showQuote(order[qi]);
        quoteEl.classList.remove("fading");
      }, 600);
    }, 8500);
  }
</script>
</body>
</html>
